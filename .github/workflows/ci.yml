name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck and test
        run: npm run check

      - name: Build
        run: npm run build
